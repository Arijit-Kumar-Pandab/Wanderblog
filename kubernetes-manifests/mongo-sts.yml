apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: mongo-ns
spec:
  serviceName: mongo-service
  replicas: 2
  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo
    spec:
      # 🔥 FORCE EC2 NODE GROUP
      nodeSelector:
        eks.amazonaws.com/compute-type: ec2

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mongo
              topologyKey: topology.kubernetes.io/zone

      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          envFrom:
            - secretRef:
                name: mongo-secrets

  volumeClaimTemplates:
    - metadata:
        name: mongo-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
